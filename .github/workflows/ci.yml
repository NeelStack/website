name: CI — Lint, Type-Check & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up pnpm
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      # 3. Set up Node.js (match your local version)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Lint
      - name: Run ESLint
        run: pnpm run lint

      # 6. Type-check (without emitting files)
      - name: TypeScript type-check
        run: pnpm exec tsc --noEmit

      # 7. Build (proves the site compiles correctly)
      #    Uses secrets for env vars — add these in GitHub repo settings
      - name: Build Next.js
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_RECEIVER_EMAIL: ${{ secrets.CONTACT_RECEIVER_EMAIL }}
          CONTACT_SENDER_EMAIL: ${{ secrets.CONTACT_SENDER_EMAIL }}
        run: pnpm run build
